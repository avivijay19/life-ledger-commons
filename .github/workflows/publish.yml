name: Maven Release & Snapshot Publish

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Configure Git for Maven Release Plugin
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Set up Maven settings.xml for GHCR
        run: |
          mkdir -p $HOME/.m2
          cat > $HOME/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GH_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Release or Snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ "${GITHUB_REF##*/}" = "main" ]; then
            echo "Performing Maven Release"
            mvn -B release:prepare release:perform -Darguments="-DskipTests" -DreleaseProfiles=release
          elif [ "${GITHUB_REF##*/}" = "develop" ]; then
            echo "Deploying Snapshot"
            mvn -B deploy -DskipTests -DreleaseProfiles=snapshot
          fi
