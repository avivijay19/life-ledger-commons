name: CI

# Track 1 — fast feedback on every push.
# Delegates all logic to life-ledger-actions/build-java.yml@v2.

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
      - '.github/renovate.json'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: avivijay19/life-ledger-actions/.github/workflows/build-java.yml@v2.1.0
    secrets: inherit
